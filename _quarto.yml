project:
  type: website
  render:
    - "*.qmd"
  resources:
    - "whitepaper.pdf"
    - "interactive-console/**"

website:
  title: "First Synthesis"
  navbar:
    background: "#ffffff"
    foreground: "#000000"
    logo: ""
    left:
      - text: "Monist"
        href: monist.qmd
      - text: "Console"
        href: interactive-console/index.html
      - text: "NF-Sketches"
        href: nf-sketches.qmd
      - text: "Docs"
        href: docs.qmd
    right:
      - text: "Whitepaper"
        href: whitepaper.qmd
      - text: "Licensing"
        href: usage.qmd
      - text: "About"
        href: about.qmd
      - icon: github
        href: "https://github.com/ryanncode/first-synth"

format:
  html:
    theme: default
    css: styles.css
    toc: false
    include-in-header:
      - text: |
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
